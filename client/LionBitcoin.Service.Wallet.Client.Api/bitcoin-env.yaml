# =============================================================================
#  Bitcoin RegTest Dev Stack
#  
#  Services:
#    - bitcoind        → Bitcoin Core in regtest mode  (RPC: 18443, P2P: 18444)
#
#  Usage:
#    docker compose up -d
#    docker compose -f bitcoin-env.yaml exec bitcoind bitcoin-cli -regtest -rpcuser=admin -rpcpassword=admin createwallet "dev"
#    docker compose -f bitcoin-env.yaml exec bitcoind bitcoin-cli -rpcwallet="dev" -regtest -rpcuser=admin -rpcpassword=admin getnewaddress
#    docker compose -f bitcoin-env.yaml exec bitcoind bitcoin-cli -regtest -rpcuser=admin -rpcpassword=admin generatetoaddress 101 <address>
# =============================================================================

networks:
  bitcoin-regtest:
    driver: bridge

volumes:
  bitcoin_data:

services:

  # ---------------------------------------------------------------------------
  # Bitcoin Core - RegTest node
  # ---------------------------------------------------------------------------
  bitcoind:
    image: ruimarinho/bitcoin-core:latest
    container_name: bitcoin-regtest
    restart: unless-stopped
    networks:
      - bitcoin-regtest
    ports:
      - "18443:18443"   # JSON-RPC
      - "18444:18444"   # P2P
    volumes:
      - bitcoin_data:/home/bitcoin/.bitcoin
    command:
      - -printtoconsole
      - -regtest=1
      - -server=1
      - -rpcuser=admin
      - -rpcpassword=admin
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcport=18443
      - -txindex=1
      - -fallbackfee=0.0001
      - -mintxfee=0.00001
      - -zmqpubrawblock=tcp://0.0.0.0:28332
      - -zmqpubrawtx=tcp://0.0.0.0:28333
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=admin", "-rpcpassword=admin", "getblockchaininfo"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s